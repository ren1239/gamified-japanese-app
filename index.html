    <script>
      // Capture install prompt as early as possible — before React mounts
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.dispatchEvent(new Event('pwaPromptReady'));
